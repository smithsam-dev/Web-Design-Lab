<!DOCTYPE html>
<html>
<head>
<style>
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 100vh;
}

.box {
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  color: white;
}

.box1 { background: red; }
.box2 { background: blue; }
.box3 { background: green; }
.box4 { background: purple; }
</style>
</head>

<body>
<div class="container">
  <div class="box box1">Section 1</div>
  <div class="box box2">Section 2</div>
  <div class="box box3">Section 3</div>
  <div class="box box4">Section 4</div>
</div>
</body>
</html>
